<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <!-- Dynamic Linear Gradient for Luxury Metallic Gold -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="25%" stop-color="#FCF6BA" />
      <stop offset="50%" stop-color="#B38728" />
      <stop offset="75%" stop-color="#FBF5B7" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(212, 175, 55, 0.15)" />
      <stop offset="100%" stop-color="rgba(212, 175, 55, 0.02)" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Elegant Calligraphic Background Heart -->
  <path d="M 50 38 C 50 38 41 22 30 29 C 20 36 22 51 34 62 L 50 76 L 66 62 C 78 51 80 36 70 29 C 59 22 50 38 50 38 Z" 
        fill="url(#heartGradient)" 
        stroke="url(#goldGradient)" 
        stroke-width="1" 
        stroke-dasharray="2 3"
        opacity="0.7" />

  <!-- LEFT RING (Groom Ring - Sleek and Bold) -->
  <circle cx="41" cy="54" r="20" 
          stroke="url(#goldGradient)" 
          stroke-width="3" 
          filter="url(#glow)" />

  <!-- RIGHT RING (Bride Ring - Smaller, overlapping, topped with diamond) -->
  <circle cx="59" cy="46" r="17" 
          stroke="url(#goldGradient)" 
          stroke-width="3" 
          filter="url(#glow)" />

  <!-- THE DIAMOND (Brilliant Cut Geometry) -->
  <g transform="translate(59, 29)">
    <!-- Sparkle Rays -->
    <line x1="0" y1="-8" x2="0" y2="-13" stroke="url(#goldGradient)" stroke-width="1.2" stroke-linecap="round" />
    <line x1="-7" y1="-7" x2="-11" y2="-11" stroke="url(#goldGradient)" stroke-width="1" stroke-linecap="round" />
    <line x1="7" y1="-7" x2="11" y2="-11" stroke="url(#goldGradient)" stroke-width="1" stroke-linecap="round" />
    
    <!-- Main Diamond Facet Body -->
    <path d="M -6 0 L 0 -8 L 6 0 L 0 5 Z" fill="url(#goldGradient)" />
    <!-- Cut highlights -->
    <path d="M -6 0 L 0 -8 L 0 5 Z" fill="rgba(255,255,255,0.4)" />
    <path d="M -3 -4 L 0 -8 L 3 -4 Z" fill="rgba(255,255,255,0.6)" />
  </g>
</svg>